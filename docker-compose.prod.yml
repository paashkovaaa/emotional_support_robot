# ── Production Docker Compose ──
# Запуск: docker compose -f docker-compose.prod.yml up -d --build
#
# Вимоги:
#   - .env файл з production-налаштуваннями
#   - SSL сертифікати в ./docker/nginx/ssl/ (або Let's Encrypt)

services:
  # ── PostgreSQL + pgvector ──
  db:
    image: pgvector/pgvector:pg16
    container_name: esbot_db_prod
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-emotional_support_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - backend_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 1G

  # ── Redis ──
  redis:
    image: redis:7-alpine
    container_name: esbot_redis_prod
    restart: always
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - backend_net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 512M

  # ── Backend (FastAPI — production) ──
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: esbot_backend_prod
    restart: always
    env_file:
      - .env
    environment:
      POSTGRES_HOST: db
      REDIS_HOST: redis
      ENVIRONMENT: production
      DEBUG: "false"
    networks:
      - backend_net
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      uvicorn backend.app.main:app
      --host 0.0.0.0
      --port 8000
      --workers 4
      --log-level warning
      --proxy-headers
      --forwarded-allow-ips='*'
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; r = httpx.get('http://localhost:8000/api/health'); r.raise_for_status()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          memory: 1G

  # ── Frontend (nginx зі static build) ──
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
    container_name: esbot_frontend_prod
    restart: always
    networks:
      - frontend_net
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 256M

  # ── Nginx reverse proxy ──
  nginx:
    image: nginx:1.27-alpine
    container_name: esbot_nginx_prod
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/nginx.prod.conf:/etc/nginx/conf.d/default.conf:ro
      - ./docker/nginx/ssl:/etc/nginx/ssl:ro
      - nginx_logs:/var/log/nginx
    networks:
      - frontend_net
      - backend_net
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 256M

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  nginx_logs:
    driver: local

networks:
  backend_net:
    driver: bridge
  frontend_net:
    driver: bridge

